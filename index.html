<head>
<meta charset="utf-8">
<title>Cookie Clicker</title>
</head>
<style>
    .div1{
     width:75%;
     background-color: cornsilk;
     margin-left: auto;
     margin-right: auto;
     margin-top: 50px;
     margin-bottom: 50px;
     padding: 20px
      }
        body {
            background-color: #005a97;
            color: white;
            font-size: 1.1em;
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }
        header{
            font-style: normal;
            grid-area: header;
            background-color: #3d6fc1;
            outline-color: #00ff60;
            border: #692703;
            border-style: ridge;
            border-width: 10px;
            font-size: 3em;
        }
        #shop{
            grid-area: "shop";
            color: white;
            background-color: #5100ff;
            border: #692703;
            border-style: ridge;
            border-width: 10px;
        }
        main{
            grid-area: main;
            background-color: #000842;
            border: #692703;
            border-style: ridge;
            border-width: 10px;
        }
        footer{
            grid-area: footer;
            background-color: #00129d;
            border: #692703;
            border-style: ridge;
            border-width: 10px;
        }
        /*this is null*/
        #wrapper{
            margin-right: auto;
            margin-left: auto; 
        }
        @media (min-width:1024px) {
        #wrapper{
            width: 80%;
            display: grid;
            grid-template-columns: auto 20%;
            grid-template-rows: 8em 24em 5em;
            grid-template-areas:"header header"
                                "main    shop"
                                "footer footer";
        }
        }
        @media (min-width:768px) and (max-width:1024px) {
        #wrapper{
            width: 100%;
            display: grid;
            grid-template-columns: auto;
            grid-template-rows: 8em 10em 24em 4em;
            grid-template-areas:"header"
                                "shop"
                                "main"
                                "footer";
        }
        }
        @media (max-width:768px) {
        body{
            font-size: 1.4em;
        }
        #wrapper{
            width: 100%;
            display: grid;
            grid-template-columns: auto;
            grid-template-rows: 8em 10em 16em 4em;
            grid-template-areas:"header"
                                "shop"
                                "main"
                                "footer";
        }
        }
        .imager{
            width: auto;
            height: auto;
            padding: 0%;
        }
        .imager img{
            width: 100%;
            height: auto;
            line-height: 0%;
            margin: 0px;
            padding: 0px;
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <header>cookie clicker</header>
        <div id="shop">
	        <h1>SHOP</h1>
            <p id="shopPrice"></p>
            <input type="button" id="shop" name="shop" value="Buy level" onClick="multShop()"></button>
            <p id="shopReturn"></p>
        </div>
        <main>
            <img src="Cookie.jpg" width="256" height="256" onClick="Clicked()" alt="" style="display: block; margin-left: auto; margin-right: auto;"/>
        </main>
        <footer>this is not a official version of cookie clicker</footer>
    </div>
</body>
  
<script>
let ClickCount=0;
//Needed global variables
let pointMulti = 1;
let level = 0;
onload(Start());
function Clicked(){
	ClickCount=ClickCount+(1*pointMulti);
}
function Start(){
    document.getElementById("shopPrice").innerHTML = "100";
}

//======================================Functions==========================================
function multShop() {
    //messege
    let error = ""
    //value trackers=======================================================================
    let mult = [5, 25, 125, 625, 3125, 15625];
    let priceTotal = [100, 1000, 10000, 100000, 1000000, 10000000];

    //Price setter
    let price = priceTotal[level];//sets price to = the current price from price total

    if (ClickCount >= price) {//will check if point is greater than or equal to the price
        pointMulti = mult[level];
        level++;
        ClickCount = ClickCount-price;
        error = "You are now Level:" + level
		document.getElementById("shopPrice").innerHTML = priceTotal[level];
    }
    else {//Will boot not enough points if you do not match the current price
        error = "Not Enough Points";
    }

    document.getElementById("shopReturn").innerHTML = error;//returns either a good messege or bad messege
}
//========================================================================================
	// call to move a set of imgs down the scren and delete them when thay hit the bottum of their frame
async function victory_cookie(frame_id,num,src){
    const frame=document.getElementById(frame_id);
    const frag=document.createDocumentFragment();
    const list_cookie_ids=new Array(num-1);

    for(let n=0;n<num;n++){
        const img_cookie=document.createElement("img");
        img_cookie.src=src;
        img_cookie.id="id_cookie_"+n;
        img_cookie.classList.add("class_cookie");
        const range=parseFloat(getComputedStyle(frame).width);
        const left=(Math.random()*range);
        img_cookie.style.marginTop="0px";
        img_cookie.style.marginLeft=left+"px";
        frag.append(img_cookie);
        list_cookie_ids[n]=img_cookie.id;
    }
    frame.append(frag);
    

    const move=(speed)=>{
        console.log("move: "+(list_cookie_ids.length===0));
        if(list_cookie_ids.length===0){ return false; }
        const range=parseFloat(getComputedStyle(frame).height);

        for(C of list_cookie_ids){
            const el=document.getElementById(C);
            const left=(Math.random()*speed)-(speed/2);
            const dist=parseInt(getComputedStyle(el).marginTop)
            if(range<dist){
                list_cookie_ids.splice(list_cookie_ids.indexOf(C),1);
                el.remove();
                continue;
            }
            const top=dist+speed;
            el.style.marginTop=top+"px";
            el.style.marginLeft=left+"px";
        }
    };

    let loop=true;
    while(true){
        loop=move(10);
        await new Promise(resolve=> setTimeout(resolve,100));
    }
}
</script>
  
</html>
