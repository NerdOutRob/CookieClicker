//========================================================================================
	// call to move a set of imgs down the scren and delete them when thay hit the bottum of their frame
async function victory_cookie(frame_id,num,src){
    const frame=document.getElementById(frame_id);
    const frag=document.createDocumentFragment();
    const list_cookie_ids=new Array(num-1);

    for(let n=0;n<num;n++){
        const img_cookie=document.createElement("img");
        img_cookie.src=src;
        img_cookie.id="id_cookie_"+n;
        img_cookie.classList.add("class_cookie");
        const range=parseFloat(getComputedStyle(frame).width);
        const left=(Math.random()*range);
        img_cookie.style.marginTop="0px";
        img_cookie.style.marginLeft=left+"px";
        frag.append(img_cookie);
        list_cookie_ids[n]=img_cookie.id;
    }
    frame.append(frag);
    

    const move=(speed)=>{
        console.log("move: "+(list_cookie_ids.length===0));
        if(list_cookie_ids.length===0){ return false; }
        const range=parseFloat(getComputedStyle(frame).height);

        for(C of list_cookie_ids){
            const el=document.getElementById(C);
            const left=(Math.random()*speed)-(speed/2);
            const dist=parseInt(getComputedStyle(el).marginTop)
            if(range<dist){
                list_cookie_ids.splice(list_cookie_ids.indexOf(C),1);
                el.remove();
                continue;
            }
            const top=dist+speed;
            el.style.marginTop=top+"px";
            el.style.marginLeft=left+"px";
        }
    };

    let loop=true;
    while(true){
        loop=move(10);
        await new Promise(resolve=> setTimeout(resolve,100));
    }
}
