<script>
let ClickCount=0
//Needed global variables
let points = 0;
let pointMulti = 1;
let level = 0;
function Clicked(){
	ClickCount=ClickCount+(1*level);
}
//======================================Functions==========================================
function multShop() {
    //messege
    let error = ""
    //value trackers=======================================================================
    let mult = [5, 25, 125, 625, 3125, 15625];
    let priceTotal = [100, 1000, 10000, 100000, 1000000, 10000000];

    //Price setter
    let price = priceTotal[level];//sets price to = the current price from price total

    if (points >= price) {//will check if point is greater than or equal to the price
        pointMulti = mult[level];
        level++;
        error = "You are now Level:" + level
    }
    else {//Will boot not enough points if you do not match the current price
        error = "Not Enough Points";
    }

    document.getElementById("shopReturn") = error;//returns either a good messege or bad messege
}
